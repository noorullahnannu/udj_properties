<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UDJ Properties - 3D Luxury</title>
 <link rel="icon" href="image.png" type="image/png">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<!-- Font Awesome (ICONS) -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">


<style>
:root{
  --gold:#d4af37;
  --black:#0b0b0f;
}

body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:linear-gradient(135deg,#000,#0b0b0f,#111);
  color:#fff;
  overflow-x:hidden;
}
/* NAV LINKS STYLE */
.navbar-nav .nav-link{
  color:#fff !important;
  margin-left:20px;
  font-weight:500;
  position:relative;
  transition:0.3s;
}

/* HOVER EFFECT */
.navbar-nav .nav-link:hover{
  color:var(--gold) !important;
}

/* UNDERLINE ANIMATION */
.navbar-nav .nav-link::after{
  content:'';
  position:absolute;
  width:0%;
  height:2px;
  left:0;
  bottom:-5px;
  background:var(--gold);
  transition:0.3s;
}

.navbar-nav .nav-link:hover::after{
  width:100%;
}

/* MOBILE ALIGN FIX */
@media(max-width:991px){
  .navbar-nav{
    text-align:center;
    margin-top:10px;
  }
  .navbar-nav .nav-link{
    margin:10px 0;
  }
}

/* NAVBAR */
.navbar{
  background:rgba(0,0,0,0.6)!important;
  backdrop-filter:blur(12px);
  border-bottom:1px solid rgba(212,175,55,0.3);
}

.navbar-brand{
  display:flex;
  align-items:center;
  gap:10px;
  color:var(--gold)!important;
  font-weight:bold;
  perspective:600px;
}

/* 3D LOGO */
.logo-3d{
  width:40px;
  height:40px;
  transform-style:preserve-3d;
  animation:rotateLogo 6s infinite linear;
}
.logo-3d img{
  width:100%;
  height:100%;
  border-radius:8px;
  box-shadow:0 0 15px rgba(212,175,55,0.6);
}

@keyframes rotateLogo{
  0%{transform:rotateY(0deg) rotateX(10deg);}
  100%{transform:rotateY(360deg) rotateX(10deg);}
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
  perspective:1200px;
  overflow:hidden;
}

.hero::before{
  content:'';
  position:absolute;
  width:120%;
  height:120%;
  background:url('https://images.unsplash.com/photo-1600585154340-be6161a56a0c') center/cover;
  transform:translateZ(-200px) scale(1.3);
  filter:brightness(0.4);
}

.hero::after{
  content:'';
  position:absolute;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
}

.hero-content{
  position:relative;
  z-index:2;
  text-align:center;
  transform:rotateX(10deg);
  animation:float 6s ease-in-out infinite;
}

.hero h1{
  font-size:65px;
  color:var(--gold);
  text-shadow:0 0 20px rgba(212,175,55,0.5);
}

.hero p{color:#ddd;font-size:18px;}

.btn-custom{
  background:var(--gold);
  border:none;
  padding:12px 28px;
  border-radius:30px;
  font-weight:bold;
  color:#000;
  transition:0.3s;
}
.btn-custom:hover{
  transform:scale(1.08);
  box-shadow:0 0 25px var(--gold);
}

/* PROPERTY CARDS */
.property-card{
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(212,175,55,0.3);
  border-radius:15px;
  overflow:hidden;
  transition:0.4s;
}
.property-card:hover{
  transform:rotateY(12deg) rotateX(8deg) scale(1.05);
  box-shadow:0 0 30px rgba(212,175,55,0.4);
}

.property-card img{
  width:100%;
  height:220px;
  object-fit:cover;
}

/* MAP */
.map-box{
  width:100%;
  height:400px;
  border-radius:15px;
  overflow:hidden;
  border:2px solid rgba(212,175,55,0.3);
}

/* FLOAT ANIMATION */
@keyframes float{
  0%,100%{transform:translateY(0px) rotateX(10deg);}
  50%{transform:translateY(-20px) rotateX(10deg);}
}

/* WHATSAPP BUTTON */
.whatsapp{
  position:fixed;
  bottom:20px;
  right:20px;
  width:60px;
  height:60px;
  background:#25D366;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:30px;
  color:#fff;
  z-index:999;
  transition:0.3s;
}
.whatsapp:hover{
  transform:scale(1.1);
}

/* CHATBOT */
.chatbot-btn{
  position:fixed;
  bottom:100px;
  right:20px;
  background:var(--gold);
  width:60px;
  height:60px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  font-size:26px;
  z-index:999;
}

.chatbox{
  position:fixed;
  bottom:170px;
  right:20px;
  width:300px;
  height:400px;
  background:#111;
  border:1px solid var(--gold);
  border-radius:15px;
  display:none;
  flex-direction:column;
  overflow:hidden;
  z-index:999;
}

.chat-header{
  background:var(--gold);
  color:#000;
  padding:10px;
  font-weight:bold;
}

.chat-body{
  flex:1;
  padding:10px;
  overflow:auto;
  font-size:14px;
}

.chat-input{
  display:flex;
}

.chat-input input{
  flex:1;
  padding:8px;
  border:none;
  outline:none;
}

.chat-input button{
  background:var(--gold);
  border:none;
  padding:8px 12px;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark fixed-top">
<div class="container">
<a class="navbar-brand">
  <div class="logo-3d">
    <img src="image.png">
  </div>
  UDJ Properties
</a>
</div>
<!-- TOGGLE -->
<button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#navMenu">
  <span class="navbar-toggler-icon"></span>
</button>

<!-- MENU -->
<div class="collapse navbar-collapse" id="navMenu">
  <ul class="navbar-nav ms-auto">
    <li class="nav-item"><a class="nav-link" href="#home">Home</a></li>
    <li class="nav-item"><a class="nav-link" href="#properties">Properties</a></li>
    <li class="nav-item"><a class="nav-link" href="#map">Map</a></li>
    <li class="nav-item"><a class="nav-link" href="#contact">Contact</a></li>
  </ul>
</div>

</div>
</nav>

</nav>

<!-- HERO -->
<div id="home" class="hero">
<div class="hero-content">
<h1>Luxury Real Estate</h1>
<p>Premium Lands | Villas | Commercial Spaces</p>
<button class="btn-custom">Explore Now</button>
</div>
</div>

<!-- PROPERTIES -->
<div id="properties" class="container py-5">
<h2 class="section-title text-center text-warning mb-4">Featured Properties</h2>

<div class="row g-4">

<div class="col-md-4">
<div class="property-card">
<img src="https://images.unsplash.com/photo-1600585154340-be6161a56a0c">
<div class="p-3">Luxury Villa - ₹1.5Cr</div>
</div>
</div>

<div class="col-md-4">
<div class="property-card">
<img src="https://images.unsplash.com/photo-1600596542815-ffad4c1539a9">
<div class="p-3">Modern Apartment - ₹80L</div>
</div>
</div>

<div class="col-md-4">
<div class="property-card">
<img src="https://images.unsplash.com/photo-1507089947368-19c1da9775ae">
<div class="p-3">Commercial Plot - ₹2Cr</div>
</div>
</div>

</div>
</div>

<!-- MAP -->
<div id="map" class="container">
<div class="map-box">
<iframe src="https://www.google.com/maps?q=bangalore&output=embed"
width="100%" height="100%" style="border:0;"></iframe>
</div>
</div>

<!-- CONTACT -->
<div id="contact" class="container py-5">
<h2 class="text-center text-warning">Contact Us</h2>

<form class="mx-auto" style="max-width:500px;">
<input class="form-control mb-2" placeholder="Name">
<input class="form-control mb-2" placeholder="Email">
<textarea class="form-control mb-2" placeholder="Message"></textarea>
<button class="btn-custom w-100">Send Inquiry</button>
</form>
</div>

<!-- WHATSAPP BUTTON -->
<a class="whatsapp"
href="https://wa.me/918754224006?text=Hi%20I%20am%20interested%20in%20your%20properties"
target="_blank">
<i class="fab fa-whatsapp"></i>
</a>

<!-- CHATBOT BUTTON -->
<div class="chatbot-btn" onclick="toggleChat()">🤖</div>

<!-- CHATBOX -->
<div class="chatbox" id="chatbox">
  <div class="chat-header">UDJ AI Assistant</div>
  <div class="chat-body" id="chatBody">
    <div>👋 Hi! How can I help you find a property?</div>
  </div>
  <div class="chat-input">
    <input id="userInput" placeholder="Ask something...">
    <button onclick="sendMsg()">➤</button>
  </div>
</div>

<script>
function toggleChat(){
  let box = document.getElementById("chatbox");
  box.style.display = box.style.display === "flex" ? "none" : "flex";
}

function sendMsg(){
  let input = document.getElementById("userInput");
  let chat = document.getElementById("chatBody");

  let msg = input.value;
  if(!msg) return;

  chat.innerHTML += `<div style="text-align:right;color:gold;">${msg}</div>`;

  // simple fake AI reply
  setTimeout(()=>{
    chat.innerHTML += `<div>🤖 Thanks! Our team will contact you soon.</div>`;
    chat.scrollTop = chat.scrollHeight;
  },500);

  input.value="";
}
</script>

</body>
</html>
